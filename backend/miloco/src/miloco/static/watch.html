<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Miloco Live</title>
<style>
  html,body{margin:0;background:#0a0a0a;color:#e5e5e5;font:14px/1.5 system-ui,-apple-system,sans-serif}
  /* Sticky-footer flex column: header / main / footer each take their natural
     height, main fills the remainder. No hardcoded vh math, so the footer
     stays in view regardless of header wrap, font scaling, or window size. */
  body{display:flex;flex-direction:column;min-height:100vh}
  header{display:flex;align-items:center;gap:12px;padding:10px 16px;background:#111;border-bottom:1px solid #222;flex-shrink:0}
  header h1{margin:0;font-size:14px;font-weight:600;color:#9ca3af}
  header input,header select{background:#1a1a1a;border:1px solid #333;color:#e5e5e5;padding:6px 10px;border-radius:6px;font:inherit;min-width:0}
  header input{flex:1;font-family:ui-monospace,Menlo,monospace}
  header select#cam{flex:1;max-width:520px}
  header option:disabled{color:#666}
  header button{background:#2563eb;border:0;color:#fff;padding:7px 14px;border-radius:6px;font:inherit;font-weight:600;cursor:pointer}
  header button:disabled{background:#333;color:#666;cursor:not-allowed}
  main{flex:1;display:flex;justify-content:center;align-items:center;padding:16px;min-height:0}
  canvas,video{max-width:100%;max-height:100%;background:#000;border-radius:8px;box-shadow:0 8px 24px rgba(0,0,0,.5)}
  canvas.hidden,video.hidden{display:none}
  footer{padding:8px 16px;font-family:ui-monospace,Menlo,monospace;font-size:12px;color:#6b7280;background:#111;border-top:1px solid #222;display:flex;gap:18px;flex-wrap:wrap;flex-shrink:0}
  footer span b{color:#e5e5e5;font-weight:600}
  .err{color:#f87171}
  /* embedded mode (?embedded=1): 嵌进 family-ui iframe 时只留视频画面 */
  body.embedded{overflow:hidden}
  body.embedded > header, body.embedded > footer{display:none}
  body.embedded > main{padding:0}
  body.embedded canvas{border-radius:0;box-shadow:none}
  /* 加载 overlay: embedded 模式 footer 隐藏后用它替代 setState 显示 */
  #loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#0a0a0a;color:#9ca3af;font-size:13px;pointer-events:none;transition:opacity .2s}
  #loading.hidden{opacity:0}
  main{position:relative}
</style>

<header>
  <h1>Miloco Live</h1>
  <select id="cam"><option value="" disabled selected id="cam-placeholder"></option></select>
  <select id="ch">
    <option value="0">channel 0</option>
    <option value="1">channel 1</option>
    <option value="2">channel 2</option>
    <option value="3">channel 3</option>
  </select>
  <button id="go"></button>
  <button id="refresh" style="background:#27272a;color:#cbd5e1">↻</button>
</header>

<main>
  <!-- 双解码通道:
       canvas#v   走 WebCodecs(secure context 下,低延迟)。
       video#vmse 走 MSE + jmuxer(LAN HTTP 等非 secure context fallback,
                  WebCodecs 不可用时启用)。两者只显示一个,另一个 .hidden。 -->
  <canvas id="v" width="1280" height="720"></canvas>
  <video id="vmse" class="hidden" muted autoplay playsinline></video>
  <div id="loading"></div>
</main>

<!-- jmuxer:H.264 Annex-B NAL → fmp4 muxer,喂给 MSE 让 <video> 播。
     仅在非 secure context(LAN HTTP)且 WebCodecs 不可用时实际启用,
     secure context 下原生 VideoDecoder 路径不会用到这个 lib。 -->
<script src="/vendor/jmuxer.min.js"></script>

<footer>
  <span id="state"></span>
  <span>codec <b id="codec">—</b></span>
  <span>resolution <b id="res">—</b></span>
  <span>fps <b id="fps">—</b></span>
  <span>latency <b id="lat">—</b> ms</span>
</footer>

<script type="module">
const $ = (id) => document.getElementById(id);
const params = new URLSearchParams(location.search);
if (params.get("embedded") === "1") document.body.classList.add("embedded");

// 语言:读主应用同源写入的 localStorage key,只识别显式 "en",其余一律中文。
const LANG = (typeof localStorage !== "undefined" && localStorage.getItem("web:lang") === "en") ? "en" : "zh";
document.documentElement.lang = LANG === "en" ? "en" : "zh-CN";
const I18N = {
  zh: {
    camPlaceholder: "加载摄像头列表中…",
    reconnect: "重连",
    refreshTitle: "刷新摄像头列表",
    loading: "拉流中…",
    ready: "就绪",
    camLoadFailed: "无法加载摄像头列表（token 错或后端离线）",
    camNone: "暂无可观看的摄像头",
    loadingCamList: "正在加载摄像头列表…",
    foundCams: (n) => `已找到 ${n} 个可观看的摄像头`,
    noCams: "当前没有可观看的摄像头",
    pickCamFirst: "请先选择摄像头",
    missingToken: "缺少 token:经 /api/miot/watch 由后端注入,或 dev 期带 ?token=… query",
    connecting: "连接中…",
    connectingCam: "正在连接摄像头…",
    disconnected: (code, reason) => `已断开 (${code})${reason ? " — " + reason : ""}`,
    wsError: "WebSocket 错误",
    camConnectedWaiting: "已连接摄像头，等待画面…",
    camUnreachable: "连不上摄像头（可能不在同一局域网，或摄像头离线）",
    decoding: "正在解码…",
    decoderConfigFailed: (msg) => "解码器配置失败：" + msg,
    mseFeedFailed: (msg) => "MSE 喂帧失败:" + msg,
    decodeFailed: (msg) => "解码失败：" + msg,
    decoderError: (msg) => "解码器错误：" + msg,
    mseDecodeError: (msg) => "MSE 解码异常:" + msg,
    noHevcLanHttp: "LAN HTTP 下无法解码 H.265",
    noWebCodecs: "浏览器不支持 WebCodecs（请用 Chrome / Edge / Firefox 最新版）",
    noHevcDecoder: "浏览器没有可用的 H.265 / HEVC 解码器",
    noDecoderFor: (codec) => `未找到可用的 ${codec} 解码配置`,
    mseLibMissing: "MSE 解码库未加载(/vendor/jmuxer.min.js 取不到)",
    wsQuiet: (s) => `WS ${s}s 无消息，重连…`,
    decodeStalled: "解码停滞 8s+，重连…",
    connectingTo: (cam) => "正在连接 " + cam + "…",
  },
  en: {
    camPlaceholder: "Loading camera list…",
    reconnect: "Reconnect",
    refreshTitle: "Refresh camera list",
    loading: "Streaming…",
    ready: "Ready",
    camLoadFailed: "Couldn't load camera list (bad token or backend offline)",
    camNone: "No viewable cameras",
    loadingCamList: "Loading camera list…",
    foundCams: (n) => `Found ${n} viewable camera(s)`,
    noCams: "No viewable cameras right now",
    pickCamFirst: "Please pick a camera first",
    missingToken: "Missing token: injected by the backend via /api/miot/watch, or pass ?token=… in the URL during dev",
    connecting: "Connecting…",
    connectingCam: "Connecting to camera…",
    disconnected: (code, reason) => `Disconnected (${code})${reason ? " — " + reason : ""}`,
    wsError: "WebSocket error",
    camConnectedWaiting: "Camera connected, waiting for video…",
    camUnreachable: "Couldn't reach the camera (it may be on another network, or offline)",
    decoding: "Decoding…",
    decoderConfigFailed: (msg) => "Couldn't set up the decoder: " + msg,
    mseFeedFailed: (msg) => "Couldn't feed MSE: " + msg,
    decodeFailed: (msg) => "Couldn't decode: " + msg,
    decoderError: (msg) => "Decoder error: " + msg,
    mseDecodeError: (msg) => "MSE decode error: " + msg,
    noHevcLanHttp: "Can't decode H.265 over LAN HTTP",
    noWebCodecs: "Your browser doesn't support WebCodecs (please use the latest Chrome / Edge / Firefox)",
    noHevcDecoder: "No H.265 / HEVC decoder available in your browser",
    noDecoderFor: (codec) => `No usable ${codec} decode configuration found`,
    mseLibMissing: "MSE decode library not loaded (/vendor/jmuxer.min.js unreachable)",
    wsQuiet: (s) => `No WS messages for ${s}s, reconnecting…`,
    decodeStalled: "Decode stalled for 8s+, reconnecting…",
    connectingTo: (cam) => "Connecting to " + cam + "…",
  },
};
const t = (k, ...a) => { const v = I18N[LANG][k] ?? I18N.zh[k]; return typeof v === "function" ? v(...a) : v; };

// 初始化静态可见文案(占位 option / 按钮 / loading / state)。
$("cam-placeholder").textContent = t("camPlaceholder");
$("go").textContent = t("reconnect");
$("refresh").title = t("refreshTitle");
$("loading").textContent = t("loading");
$("state").textContent = t("ready");

// The backend's GET /api/miot/watch handler substitutes this placeholder
// with the live server.token before sending the HTML. If the substitution
// did NOT happen (e.g. dev-mode static-file access), the literal placeholder
// is left in place and we fall back to URL ?token=… or localStorage.
const INJECTED_TOKEN = "__MILOCO_TOKEN__";
// **不能**用 `!== "__MILOCO_TOKEN__"` 这种严格相等比较 — backend 是全文 replace,
// 比较右侧的 "__MILOCO_TOKEN__" 字符串字面量也会被替换成真 token,导致条件
// 永远 false 让真注入态被误判为未注入。startsWith 判定里的 "__MILOCO_" 子串
// **不含完整占位** `__MILOCO_TOKEN__`,replace 不动它,继续工作。
const TOKEN_INJECTED = INJECTED_TOKEN && !INJECTED_TOKEN.startsWith("__MILOCO_");

// Token resolution priority: injected by backend > URL param > localStorage(只读)。
// 故意不写 localStorage:query token 走临时态,刷新或换页就丢。早期版本会把 query
// token setItem 持久化方便 dev,但住户/群聊转发 watch URL 时会让接收方浏览器一直
// 用旧 token,token rotate 后看不出 401 来源。生产期 backend 注入路径(TOKEN_INJECTED)
// 优先,这条 fallback 仅给手动 dev 链接 / 老链接兜底用。
function resolveToken() {
  if (TOKEN_INJECTED) return INJECTED_TOKEN;
  return params.get("token") || localStorage.getItem("miloco_token") || "";
}

// Pre-fill channel from URL / localStorage.
const initialChannel = params.get("channel") || localStorage.getItem("miloco_channel");
if (initialChannel) $("ch").value = initialChannel;

// Camera list — only "perception-active" cameras (those whose PPCS handshake
// succeeded and SDK is actively receiving frames). /api/perception/devices
// already filters out cloud-online-but-stream-dead devices, so the dropdown
// shows exactly the cameras a watch session can actually play.
async function loadCameras() {
  const token = resolveToken();
  if (!token) return null;
  try {
    const resp = await fetch("/api/perception/devices", {
      headers: { "Authorization": `Bearer ${token}` },
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const json = await resp.json();
    if (json.code !== 0) throw new Error(json.message || "Couldn't fetch");
    // Backend only returns camera-type sources currently; filter just in case.
    const all = Array.isArray(json.data) ? json.data : [];
    return all.filter((d) => !d.device_type || d.device_type === "camera");
  } catch (e) {
    console.warn("loadCameras failed:", e);
    return null;
  }
}

function populateCameraSelect(cameras) {
  const sel = $("cam");
  sel.innerHTML = "";
  if (cameras === null) {
    const opt = document.createElement("option");
    opt.value = ""; opt.disabled = true; opt.selected = true;
    opt.textContent = t("camLoadFailed");
    sel.appendChild(opt);
    return;
  }
  if (cameras.length === 0) {
    const opt = document.createElement("option");
    opt.value = ""; opt.disabled = true; opt.selected = true;
    opt.textContent = t("camNone");
    sel.appendChild(opt);
    return;
  }
  for (const c of cameras) {
    const opt = document.createElement("option");
    opt.value = c.did;
    const room = c.room_name ? ` · ${c.room_name}` : "";
    opt.textContent = `${c.name}${room}`;
    sel.appendChild(opt);
  }
  // Pre-select: URL > localStorage > first available.
  const wanted = params.get("camera_id") || localStorage.getItem("miloco_camera_id");
  const has = (id) => Array.from(sel.options).some(o => o.value === id);
  if (wanted && has(wanted)) {
    sel.value = wanted;
  } else {
    sel.value = sel.options[0].value;
  }
}

async function refreshCameraList() {
  setState(t("loadingCamList"));
  const cameras = await loadCameras();
  populateCameraSelect(cameras);
  if (cameras && cameras.length) {
    setState(t("foundCams", cameras.length));
  } else if (cameras && cameras.length === 0) {
    setState(t("noCams"), true);
  }
}

let ws, decoder, configured = false;
// 每次 connect() 新建一个 AbortController,其 signal 传给该 socket 的所有 listener;
// tearDown() abort 它 → 一次性解绑旧 socket 的全部 listener,避免频繁 reconnect 时
// 已关闭 socket 的 handler(连同闭包持有的旧 socket)滞留拖慢 GC。
// 注:addEventListener 的 {signal} 选项要 Chrome 90 / Safari 15(2021)+;更老的
// LAN webview 会忽略它 → signal 解绑失效,此时**靠各 handler 内的身份守卫兜正确性**
// (旧 listener 仍触发但因 thisWs!==ws / currentTarget!==ws 早退,不污染新连接),
// 只是拿不到 GC 提前释放的好处。即:新浏览器走 signal 解绑,老浏览器走身份守卫降级。
let wsAbort = null;
let ensureDecoderInFlight = null; // Promise; null when not currently probing
let codecHint = null;            // "h264" | "h265" from init JSON
// 后端发了 error 信令(如 camera_unreachable)即将主动关连接 —— 标记后让 close
// 事件不要用泛泛的"已断开 (code)"覆盖掉那条更具体的原因文案。
let serverWillClose = false;
let stats = {
  frames: 0,
  lastSec: performance.now(),
  lastFrameLocalMs: 0,           // Date.now() of last successfully decoded frame
  lastWsTs: 0,                   // Date.now() of last WS message arrival
};

// WebCodecs(VideoDecoder)是 SecureContext API,只在 https/localhost 暴露。
// LAN HTTP(http://10.x.x.x / 192.168.x.x)下 isSecureContext=false,
// `VideoDecoder in window === false`,用 MSE + jmuxer 兜底:把 H.264 NAL
// 包成 fmp4 fragment 喂 <video>,延迟比 WebCodecs 高 50-200ms 但能播,且
// MSE 在非 secure context 下仍可用。住户访问 LAN IP 不再"解码器配置失败"。
// MSE 路径 jmuxer 不支持 H.265 — H.265 cam 在 LAN HTTP 下会报解码失败。
const useMSE = !("VideoDecoder" in window);
let jmuxer = null;
let mseFpsRaf = null;
let lastMseTs = 0;  // 上一帧 WS 时间戳(ms),用于算 jmuxer feed duration

// ---------- NAL / SPS helpers ----------

// Walk Annex-B byte buffer, yield each NAL unit body (without the start code).
function* iterNALUnits(buf) {
  let i = 0;
  while (i < buf.length - 3) {
    let sc = -1, scLen = 0;
    if (buf[i] === 0 && buf[i + 1] === 0 && buf[i + 2] === 0 && buf[i + 3] === 1) {
      sc = i; scLen = 4;
    } else if (buf[i] === 0 && buf[i + 1] === 0 && buf[i + 2] === 1) {
      sc = i; scLen = 3;
    }
    if (sc < 0) { i++; continue; }
    const start = sc + scLen;
    // find next start code
    let j = start;
    let nextSc = -1;
    while (j < buf.length - 2) {
      if (buf[j] === 0 && buf[j + 1] === 0 && (buf[j + 2] === 1 || (buf[j + 2] === 0 && buf[j + 3] === 1))) {
        nextSc = j; break;
      }
      j++;
    }
    const end = nextSc >= 0 ? nextSc : buf.length;
    yield buf.subarray(start, end);
    i = end;
  }
}

// Strip H.264/H.265 emulation prevention bytes (0x03 after 0x00 0x00).
function unescapeRBSP(nal) {
  const out = [];
  for (let i = 0; i < nal.length; i++) {
    if (i + 2 < nal.length && nal[i] === 0 && nal[i + 1] === 0 && nal[i + 2] === 3) {
      out.push(0, 0); i += 2;
    } else out.push(nal[i]);
  }
  return Uint8Array.from(out);
}

// Build avc1.PPCCLL codec string from the H.264 SPS NAL (NAL type = 7).
// SPS body layout after the 1-byte NAL header:
//   profile_idc (1B) | constraint_set_flags+reserved (1B) | level_idc (1B) | ...
function avcCodecFromSps(spsNal) {
  // spsNal already has the 1-byte NAL header stripped by findSpsNal,
  // so the RBSP starts directly with profile_idc.
  //   byte 0 : profile_idc
  //   byte 1 : constraint_set_flags + reserved (8 bits)
  //   byte 2 : level_idc
  const r = unescapeRBSP(spsNal);
  if (r.length < 3) return null;
  const profile = r[0], compat = r[1], level = r[2];
  const hex = (n) => n.toString(16).padStart(2, "0").toUpperCase();
  return `avc1.${hex(profile)}${hex(compat)}${hex(level)}`;
}

// Scan an Annex-B access unit for an SPS NAL (h264 type=7, h265 type=33).
function findSpsNal(accessUnit, codec) {
  for (const nal of iterNALUnits(accessUnit)) {
    if (!nal.length) continue;
    if (codec === "h264") {
      if ((nal[0] & 0x1f) === 7) return nal.subarray(1);
    } else if (codec === "h265") {
      if (((nal[0] >> 1) & 0x3f) === 33) return nal.subarray(2);
    }
  }
  return null;
}

function setState(text, isErr=false) {
  const el = $("state");
  el.textContent = text;
  el.className = isErr ? "err" : "";
  // embedded 模式(HeroNow 各实时卡)footer 被隐藏看不到 #state,把状态文字同步写到
  // loading overlay。**颜色也要同步**:overlay 默认灰色,错误态若只改文字不改色,
  // "连不上摄像头…"会跟正常的灰色"拉流中…"长得一模一样,住户读不出这是故障——
  // 那样"明确告知连不上"的改动目标在嵌入卡里就没闭环。错误态上红,恢复时清掉。
  const loading = $("loading");
  if (loading && !loading.classList.contains("hidden")) {
    loading.textContent = text;
    loading.style.color = isErr ? "#f87171" : "";
  }
}
function hideLoading() {
  $("loading")?.classList.add("hidden");
}

function tearDown() {
  configured = false;
  codecHint = null;
  serverWillClose = false;
  stats.lastFrameLocalMs = 0;
  stats.lastWsTs = 0;
  try { decoder?.close?.(); } catch {}
  decoder = null;
  try { jmuxer?.destroy?.(); } catch {}
  jmuxer = null;
  lastMseTs = 0;
  if (mseFpsRaf) {
    // requestVideoFrameCallback 的 handle 用 cancelVideoFrameCallback 取消,
    // 不是 cancelAnimationFrame(两套 ID space 不同)。Chrome 旧版可能没暴露
    // cancelVideoFrameCallback,typeof 守一下。jmuxer.destroy + video.removeAttribute
    // 已让 video 停帧 cb 不再 self-schedule,这条主要是显式释放好排查。
    const v = $("vmse");
    if (v && typeof v.cancelVideoFrameCallback === "function") {
      v.cancelVideoFrameCallback(mseFpsRaf);
    }
    mseFpsRaf = null;
  }
  // abort 先于 close:一次性解绑旧 socket 的 open/close/error/message listener,
  // 它们此后不再触发(身份守卫成了冗余兜底)。
  try { wsAbort?.abort?.(); } catch {}
  wsAbort = null;
  try { ws?.close?.(); } catch {}
  ws = null;
  // Wipe the canvas so a stale image from the previous camera doesn't
  // linger while the new connection is establishing (or if it never
  // produces frames at all — e.g. user picks an unavailable channel).
  const canvas = $("v");
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // 同款重置 <video>:停播 + 清 src + 隐藏,canvas 默认显示态。下一次 connect()
  // 走哪条路径再决定切谁可见。
  const video = $("vmse");
  try { video.pause(); } catch {}
  video.removeAttribute("src");
  video.load();
  video.classList.add("hidden");
  canvas.classList.remove("hidden");
  $("res").textContent = "—";
  $("fps").textContent = "—";
  $("codec").textContent = "—";
  // 重新亮出 loading overlay。首帧成功后 hideLoading() 把它永久藏起,若不在这里复位,
  // 流中断 → reconnect(stall 看门狗 / cam 切换)走的新连接里 setState 会因 overlay
  // 仍 hidden 而被跳过(见 setState 的 !hidden 守卫),embedded 卡里只剩卡住的旧画面、
  // 无任何状态提示。复位后"连接中…/连不上摄像头"等(含错误红)才能在重连时重新可见。
  $("loading")?.classList.remove("hidden");
  const loading = $("loading");
  if (loading) loading.style.color = "";  // 清掉上次的错误红,起步是中性灰
}

function connect() {
  tearDown();
  const camId = $("cam").value;
  const channel = $("ch").value;
  const token = resolveToken();
  if (!camId) { setState(t("pickCamFirst"), true); return; }
  if (!token) { setState(t("missingToken"), true); return; }
  localStorage.setItem("miloco_camera_id", camId);
  localStorage.setItem("miloco_channel", channel);

  const proto = location.protocol === "https:" ? "wss" : "ws";
  const url = `${proto}://${location.host}/api/miot/ws/video_stream`
            + `?camera_id=${encodeURIComponent(camId)}`
            + `&channel=${encodeURIComponent(channel)}`
            + `&token=${encodeURIComponent(token)}`;

  setState(t("connecting"));
  ws = new WebSocket(url);
  ws.binaryType = "arraybuffer";
  // 本次连接的 socket 引用 + 专属 AbortController。listener 都挂在 thisWs 上并带
  // signal,支持的浏览器上 tearDown abort 后一次性解绑。身份守卫 `thisWs !== ws` 不是
  // 可有可无的"冗余"——在不支持 {signal} 的老 webview 上它是唯一的正确性保证,在新
  // 浏览器上则兜"事件已入队、abort 在派发前一刻才到"的极端时序。
  const thisWs = ws;
  wsAbort = new AbortController();
  const sig = wsAbort.signal;

  // open 只代表"浏览器 ↔ 服务器"握手成功,**不**代表服务器连上了摄像头——后端
  // accept() 是无条件的。所以这里不能写"已连接",否则跨局域网根本拉不到流时,住户
  // 看到"已连接"却永远没画面。真正的"已连接"语义留给收到 init 信令(见 onMessage)。
  thisWs.addEventListener("open", () => {
    if (thisWs !== ws) return;
    setState(t("connectingCam"));
  }, { signal: sig });
  thisWs.addEventListener("close", (ev) => {
    if (thisWs !== ws) return;  // 旧 socket 的迟到 close,忽略,别盖新连接状态
    // 后端 error 信令(camera_unreachable 等)已经设了更具体的文案 —— 不要用泛泛的
    // "已断开 (1011)" 覆盖它,否则住户看到的还是没头没尾的 code。
    if (!serverWillClose) {
      setState(t("disconnected", ev.code, ev.reason),
               ev.code !== 1000);
    }
    configured = false;
  }, { signal: sig });
  thisWs.addEventListener("error", () => {
    if (thisWs !== ws) return;
    setState(t("wsError"), true);
  }, { signal: sig });

  thisWs.addEventListener("message", onMessage, { signal: sig });
}

function onMessage(ev) {
  // 身份守卫:onMessage 是共享具名函数(非每连接新建的闭包),用 ev.currentTarget
  // 比对当前活跃 ws——它在 listener 执行期间恒等于 addEventListener 的绑定 socket。
  // tearDown 不解绑旧 socket 监听,旧 socket 已入队的 message 事件可能在 reconnect
  // 新建 ws 之后才派发;不挡掉的话,旧帧/旧 init/旧 error 会污染新连接的全局解码状态
  // (codecHint/configured/serverWillClose/stats.lastWsTs)甚至喂错相机的帧进 decoder。
  if (ev.currentTarget !== ws) return;
  stats.lastWsTs = Date.now();

  if (typeof ev.data === "string") {
    let msg;
    try { msg = JSON.parse(ev.data); } catch { return; }
    if (msg.type === "init") {
      codecHint = msg.codec || "h264";
      $("codec").textContent = codecHint + " / " + (msg.container || "annexb");
      // 收到 init 才是真"连上摄像头了"——后端已拿到该 cam 的流并广播了编码信息。
      setState(t("camConnectedWaiting"));
    } else if (msg.type === "error") {
      // 后端首帧看门狗判定连不上(camera_unreachable 等)→ 明确告知住户,不再死等。
      // serverWillClose 标志让随后的 close 事件不要再覆盖成"已断开 (1011)",保留这条
      // 更有信息量的文案。
      // 后端 message 是中文;信令带机器码 reason,已知 reason 改用本地译文(随 UI 语言),
      // 未知 reason 才回退后端 message —— 否则英文模式下仍会显后端那句中文。
      serverWillClose = true;
      const REASON_KEY = { camera_unreachable: "camUnreachable" };
      const rk = REASON_KEY[msg.reason];
      setState(rk ? t(rk) : (msg.message || t("camUnreachable")), true);
    }
    return;
  }

  const buf = new Uint8Array(ev.data);
  if (buf.byteLength < 16 || !codecHint) return;
  const frameType = buf[0];                                          // 1=key, 0=delta
  let ts = Number(new DataView(buf.buffer, buf.byteOffset + 8, 8).getBigUint64(0));
  // defense-in-depth:服务端已对哨兵 PTS(0xFFFF...)做净化(ws.py 的 _TS_SAFE_MAX=9e15),
  // 这里再兜一道——非安全整数 / 负数 / 超 9e15 的 ts 一律回退到 0,防今后别的非法 wire 值
  // 让 new EncodedVideoChunk({timestamp: ts*1000}) 抛 [EnforceRange] TypeError(timestamp
  // 是 WebIDL long long,ts*1000 须落在 ±2^63 内)。9e15 跟服务端 _TS_SAFE_MAX 同字面值、
  // 前后端口径一致;它严格小于 2^63/1000 且 < Number.MAX_SAFE_INTEGER,正常相机 ts 远在其下。
  // 用 >= 9e15 跟服务端的 `ts < 9e15`(超出即兜底)严格对称——"恰好 9e15"两端都判越界,
  // 比较算子也一致(不只是字面值一致)。
  if (!Number.isSafeInteger(ts) || ts < 0 || ts >= 9e15) ts = 0;
  const nalu = buf.subarray(16);

  // Lazy decoder configuration: parse the first key frame's SPS so we use the
  // exact profile/level the stream actually carries — avoids "configured for
  // baseline but stream is High" failures. ensureDecoder() probes WebCodecs
  // for codec support asynchronously; while that's pending, drop frames so
  // we don't decode-before-configure. The IDR's bytes are passed in so
  // ensureDecoder can both sniff codec params AND submit the IDR as the
  // very first chunk after configure() — WebCodecs requires the first chunk
  // post-configure to be a keyframe.
  if (!configured) {
    if (frameType !== 1) return;                                     // wait for IDR
    if (!ensureDecoderInFlight) {
      // Copy the NAL bytes; the underlying ArrayBuffer of `ev.data` could
      // theoretically be reclaimed before ensureDecoder resolves.
      const naluCopy = new Uint8Array(nalu);
      ensureDecoderInFlight = ensureDecoder(naluCopy, ts)
        .then(() => setState(t("decoding")))
        .catch((e) => {
          console.error("configure error", e);
          setState(t("decoderConfigFailed", e.message), true);
        })
        .finally(() => { ensureDecoderInFlight = null; });
    }
    return;
  }

  if (useMSE) {
    // jmuxer 只接受 H.264 NAL(Annex-B),H.265 在 LAN HTTP 下走不通(会报解码失败)。duration 用真实帧间隔(ms),
    // 跟着 WS 来的 ts 走;首帧没前帧时 fallback 40ms(≈25fps)。这样 15fps /
    // 30fps cam 都不漂——比写死 40ms 长时间播放后视频跟实时偏差累积更稳。
    try {
      // duration cap 500ms:5fps cam(米家某些低带宽 cam)真实间隔 ~200ms,如果
      // cap 200 会被 clamp 让 jmuxer 内部时钟跟流时钟漂移。500 给低帧率 cam 留余地。
      const dur = lastMseTs > 0 ? Math.max(1, Math.min(500, ts - lastMseTs)) : 40;
      lastMseTs = ts;
      jmuxer?.feed({ video: nalu, duration: dur });
    } catch (e) {
      console.error("jmuxer feed error", e);
      setState(t("mseFeedFailed", e.message), true);
    }
    return;
  }

  try {
    decoder.decode(new EncodedVideoChunk({
      type: frameType === 1 ? "key" : "delta",
      timestamp: ts * 1000,                                           // ms → us
      data: nalu,
    }));
  } catch (e) {
    console.error("decode error", e);
    setState(t("decodeFailed", e.message), true);
  }
}

// HEVC SPS profile_tier_level parsing is fiddly; instead we probe a curated
// list of common Main/Main10 + tier/level combinations against
// VideoDecoder.isConfigSupported(), pick the first one Chrome accepts, and
// configure with that. This works because Chrome/Edge will accept any codec
// string whose declared capability is >= the actual stream's needs.
function hevcCodecCandidates() {
  const profiles = ["1.6", "2.4"];                  // Main, Main10
  const levels = ["L150", "L153", "L156",           // 5.0 / 5.1 / 5.2
                  "L120", "L123",                   // 4.0 / 4.1
                  "L93", "L90"];                    // 3.1 / 3.0
  const tiers  = ["B0", "B00"];                     // constraint flags
  const prefixes = ["hev1", "hvc1"];
  const out = [];
  for (const px of prefixes)
    for (const p of profiles)
      for (const l of levels)
        for (const t of tiers)
          out.push(`${px}.${p}.${l}.${t}`);
  return out;
}

// Common H.264 fallback profile/level combos to probe if the SPS-derived
// string isn't accepted (some browsers reject very specific bytes even when
// the underlying decoder can handle the stream).
function avcCodecCandidates() {
  // profile bytes: Baseline 42, Main 4D, High 64
  // compat byte:   typical 00, C0 (constraint set 0+1), 40
  // level bytes:   1E (3.0), 1F (3.1), 20 (3.2), 28 (4.0), 29 (4.1), 2A (4.2)
  const out = [];
  for (const profile of ["42", "4D", "64"])
    for (const compat of ["00", "C0", "40"])
      for (const level of ["1E", "1F", "20", "28", "29", "2A"])
        out.push(`avc1.${profile}${compat}${level}`);
  return out;
}

// Probe codec × hardwareAcceleration combos. On Linux Chrome, the VAAPI
// path often reports `isConfigSupported=true` then errors on actual decode
// ("Unsupported configuration" from the async error callback). Software
// decode is more permissive, so we probe both modes and pick the first
// that the browser fully accepts.
async function probeCodec(codec) {
  for (const hwAccel of ["prefer-hardware", "prefer-software", "no-preference"]) {
    try {
      const sup = await VideoDecoder.isConfigSupported({
        codec,
        hardwareAcceleration: hwAccel,
      });
      if (sup.supported) return { codec, hwAccel };
    } catch { /* keep trying */ }
  }
  return null;
}

async function pickCodecString(firstKeyNAL) {
  if (codecHint === "h264") {
    const sps = findSpsNal(firstKeyNAL, "h264");
    const derived = sps && avcCodecFromSps(sps);
    const candidates = derived ? [derived, ...avcCodecCandidates()] : avcCodecCandidates();
    for (const codec of candidates) {
      const r = await probeCodec(codec);
      if (r) {
        if (r.codec !== derived) {
          console.warn(`SPS-derived codec ${derived} rejected, fell back to ${r.codec}`);
        }
        return r;
      }
    }
    return null;
  }
  // H.265: probe candidate strings for browser support.
  for (const codec of hevcCodecCandidates()) {
    const r = await probeCodec(codec);
    if (r) return r;
  }
  return null;
}

async function ensureDecoder(firstKeyNAL, firstKeyTs) {
  if (useMSE) {
    if (codecHint === "h265") {
      // jmuxer 不支持 HEVC,LAN HTTP + H.265 cam 时只能引导住户启用 WebCodecs。
      const err = new Error(t("noHevcLanHttp"));
      throw err;
    }
    return ensureMseDecoder(firstKeyNAL, firstKeyTs);
  }
  if (!("VideoDecoder" in window)) {
    throw new Error(t("noWebCodecs"));
  }

  const canvas = $("v");
  const ctx = canvas.getContext("2d");

  const pick = await pickCodecString(firstKeyNAL);
  if (!pick) {
    const err = new Error(
      codecHint === "h265"
        ? t("noHevcDecoder")
        : t("noDecoderFor", codecHint)
    );
    throw err;
  }
  const { codec: codecString, hwAccel } = pick;
  $("codec").textContent = `${codecHint} (${codecString}, ${hwAccel})`;

  decoder = new VideoDecoder({
    output: (frame) => {
      try {
        if (canvas.width !== frame.displayWidth) {
          canvas.width = frame.displayWidth;
          canvas.height = frame.displayHeight;
          $("res").textContent = `${frame.displayWidth}×${frame.displayHeight}`;
        }
        ctx.drawImage(frame, 0, 0);
        hideLoading();
        stats.frames++;
        stats.lastFrameLocalMs = Date.now();
        const now = performance.now();
        if (now - stats.lastSec >= 1000) {
          $("fps").textContent = stats.frames.toFixed(0);
          stats.frames = 0;
          stats.lastSec = now;
        }
      } finally {
        frame.close();
      }
    },
    error: (e) => {
      console.error("decoder error", e);
      setState(t("decoderError", e.message), true);
      configured = false;
    },
  });

  decoder.configure({
    codec: codecString,
    optimizeForLatency: true,
    hardwareAcceleration: hwAccel,
  });

  // Submit the IDR that we used to sniff the codec as the very first
  // EncodedVideoChunk. WebCodecs requires the first chunk after configure()
  // to be a keyframe — without this, the next P frame from the WS would
  // throw "A key frame is required after configure()".
  decoder.decode(new EncodedVideoChunk({
    type: "key",
    timestamp: firstKeyTs * 1000,
    data: firstKeyNAL,
  }));
  configured = true;
}

// MSE + jmuxer 路径 init:LAN HTTP 等非 secure context 下走这里,jmuxer 把
// Annex-B NAL → fmp4 fragment 喂给 <video>,绕开 SecureContext API 限制。
async function ensureMseDecoder(firstKeyNAL, firstKeyTs) {
  if (typeof window.JMuxer === "undefined") {
    throw new Error(t("mseLibMissing"));
  }
  const canvas = $("v");
  const video = $("vmse");
  // 切显示态:canvas 隐,video 显。tearDown 会反向切回。
  canvas.classList.add("hidden");
  video.classList.remove("hidden");
  $("codec").textContent = `${codecHint} (MSE / fmp4 via jmuxer)`;

  jmuxer = new window.JMuxer({
    node: video,
    mode: "video",
    flushingTime: 0,         // 立即 flush,降低延迟到 1 帧
    fps: 25,
    debug: false,
    onError: (data) => {
      console.warn("jmuxer error", data);
      setState(t("mseDecodeError", data?.message || data), true);
    },
  });

  // playing 时同步分辨率,跟 WebCodecs 路径口径一致。
  video.addEventListener("playing", () => {
    hideLoading();
    if (video.videoWidth) {
      $("res").textContent = `${video.videoWidth}×${video.videoHeight}`;
    }
  }, { once: true });

  // FPS:requestVideoFrameCallback 现代浏览器都有(Chrome 83+ / Safari 15.4+),
  // 没有则不显示 fps,功能不影响。
  if ("requestVideoFrameCallback" in HTMLVideoElement.prototype) {
    let lastSec = performance.now();
    let frames = 0;
    const cb = (_, _meta) => {
      // tearDown 把 jmuxer 设 null;cb 仍可能在 cancel 跟 fire 的 race window 里
      // 跑一次,此时再 self-schedule 会留个孤悬 handle 让 mseFpsRaf 写回非 null。
      // 用 jmuxer 状态强对齐:jmuxer 销毁就停 self-schedule。
      if (!jmuxer) return;
      frames++;
      stats.lastFrameLocalMs = Date.now();
      const now = performance.now();
      if (now - lastSec >= 1000) {
        $("fps").textContent = frames.toFixed(0);
        frames = 0; lastSec = now;
      }
      mseFpsRaf = video.requestVideoFrameCallback(cb);
    };
    mseFpsRaf = video.requestVideoFrameCallback(cb);
  }

  // 喂第一个 IDR(SPS/PPS+IDR 在同一 access unit 里)。jmuxer 内部用 SPS
  // 推 codec 配置,后续 P 帧才能解。duration 40ms 跟 onMessage 里同款假设。
  // lastMseTs = firstKeyTs 让第二帧能用 ts2-firstKeyTs 算真实间隔,不再 fallback 40。
  jmuxer.feed({ video: firstKeyNAL, duration: 40 });
  lastMseTs = firstKeyTs;
  configured = true;
}



$("go").addEventListener("click", connect);
$("refresh").addEventListener("click", refreshCameraList);
// Always (re)connect on either selection change — covers both "switch while
// a stream is running" and "pick after a previous connection died" without
// requiring the user to also press 重连.
$("cam").addEventListener("change", connect);
$("ch").addEventListener("change", connect);

// Stale-stream watchdog: WS quiet for 15 s OR decoded video stalled for 8 s
// while WS still flowing → reconnect. Using `lastWsTs` (any inbound message)
// instead of `lastFrameTs` keeps us patient through the camera's first-IDR
// wait, which can be a few seconds on IPC streams with sparse keyframes.
setInterval(() => {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  const now = Date.now();
  const wsAge = stats.lastWsTs ? now - stats.lastWsTs : 0;
  if (wsAge > 15000) {
    setState(t("wsQuiet", (wsAge/1000).toFixed(0)), true);
    connect();
    return;
  }
  if (configured && stats.lastFrameLocalMs && now - stats.lastFrameLocalMs > 8000) {
    setState(t("decodeStalled"), true);
    connect();
  }
}, 2000);

// Page boot: load camera list, then auto-connect if a camera is selected.
(async () => {
  if (!resolveToken()) {
    setState(t("missingToken"), true);
    return;
  }
  // wantedCam 来自 URL query,strip 控制字符防 setState/textContent 拼字符串
  // 显示乱码(住户复制错链接含 \r\n / \x00 等不可见字符);截 64 字符防恶意/误粘
  // 超长串撑爆 footer 横滚(米家 did 实际 ≤32 hex 字符)。
  const wantedCamRaw = params.get("camera_id");
  const wantedCam = wantedCamRaw
    ? wantedCamRaw.replace(/[\x00-\x1f\x7f]/g, "").slice(0, 64)
    : null;
  // embedded 模式:URL 已指定 camera_id,跳过 fetch devices 列表直接 connect。
  if (params.get("embedded") === "1" && wantedCam) {
    const opt = document.createElement("option");
    opt.value = wantedCam;
    opt.textContent = wantedCam;
    $("cam").appendChild(opt);
    $("cam").value = wantedCam;
    connect();
    return;
  }
  await refreshCameraList();
  // 兜底:fetch 列表空 / wantedCam 不在 list (cam.in_use=false 时被 perception 移除),
  // 但 query 已指明 cam,强插 select 让 connect 仍能跑(WS 走 miot WebRTC 不依赖
  // perception adapter,inUse=false 时仍能拉流)。
  if (wantedCam) {
    const has = Array.from($("cam").options).some(o => o.value === wantedCam);
    if (!has) {
      $("cam").innerHTML = "";
      const opt = document.createElement("option");
      opt.value = wantedCam;
      opt.textContent = wantedCam;
      $("cam").appendChild(opt);
      // 盖掉 refreshCameraList 留下的红字"当前没有可观看的摄像头",视频在播
      // 时 footer 红字让住户怀疑画面是缓存。
      setState(t("connectingTo", wantedCam));
    }
    $("cam").value = wantedCam;
  }
  if ($("cam").value) connect();
})();
</script>
</html>
