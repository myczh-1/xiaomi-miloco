# miloco 后端默认配置
#
# 加载优先级（高 → 低）：
#   环境变量（MILOCO_* / MILOCO_SERVER__URL 等）
#   > $MILOCO_HOME/config.json（用户可编辑，结构见 settings.schema.json）
#   > 本文件（后端默认值）
#   > 代码默认值

# 是否启用调试模式
debug: false

# 目录配置（storage 相对路径基于 $MILOCO_HOME 解析）
directories:
  static: "static"    # 后端静态资源目录（相对后端源码 root）
  storage: "."        # 工作目录；"." 表示直接使用 $MILOCO_HOME
  models: "models"          # ONNX 模型目录；为空时默认 $MILOCO_HOME/models

# 多模态大模型（omni）默认配置
# - omni：当前生效配置（引擎兜底默认，住户在 web「模型」页配好 api_key / 换模型即覆盖）
# - omni_profiles：web「模型」页可切换的档案列表；不预置任何档案，由住户自行新增
# - api_key 一律留空，由住户在 web「模型」页填写(本文件不存任何密钥)；env / config.json 可覆盖
model:
  omni:
    label: "mimo"
    model: "xiaomi/mimo-v2.5"
    base_url: "https://api.xiaomimimo.com/v1"
    api_key: ""
  omni_profiles: []

# miloco 后端服务相关配置
server:
  host: "127.0.0.1"                                            # 后端监听 host(默认仅本机;开 LAN 改 0.0.0.0,详见 settings.py 注释)
  port: 1810                                                   # 后端监听端口
  log_level: "info"                                            # uvicorn 日志级别
  enable_console_logging: true                                 # 是否启用控制台日志
  # HTTPS / TLS 已废弃：backend 永远 HTTP，跨网加密走反代（nginx / cloudflare-tunnel）+ 真证书。
  # 旧 tls_certfile / tls_keyfile 字段保留，但写了也不生效（uvicorn 启动会打 deprecation warning）。

# SQLite 数据库连接参数
database:
  path: "miloco.db"          # 数据库文件（相对 storage 或绝对路径）
  timeout: 30.0              # 连接超时（秒）
  check_same_thread: false   # 是否强制单线程访问
  isolation_level: null      # 事务隔离级别；null 表示默认

# FastAPI 应用元信息
app:
  title: "Miloco backend"
  service_name: "miloco-backend"
  description: "Miloco backend, responsible for scheduling various modules"
  # version 不在此硬编码：运行时由 AppSettings._resolve_version() 读已安装包元数据
  # （env MILOCO_APP__VERSION / config.json 仍可覆盖）

# MIoT 云接入参数（可选值：cn / de / i2 / ru / sg / us）
miot:
  cloud_server: "cn"

# 摄像头采集参数
camera:
  frame_interval: 1000   # 帧采集间隔（毫秒）
  max_cache_images: 6    # 最大缓存图像数量

# 规则引擎相关配置
rule:
  log_ttl: 30                  # 天
  default_duration_ratio: 0.6  # duration_seconds 窗口 True 比例默认阈值，未显式 --duration-ratio 时生效

# 感知管线配置
perception:
  log_ttl: 30                  # 感知日志保留天数
  tier_u_dump_enable: false    # POST /api/identity/pool/dump 调试端点开关（生产保持 false，本地调试可设 true）
  # RTSP 流接入（测试 / 调试用）：填入 URL 后感知引擎会同时拉 RTSP 流
  # 手机装 IP Webcam（Android）或 IPCam（iOS）推流即可
  rtsp:
    url: ""                    # 如 rtsp://192.168.x.x:8080/h264_pcm.sdp
    name: "Phone Camera"
  collect:
    window_size: 4           # 时间窗口大小（秒）
    max_windows: 3           # 最大待处理窗口数
    settle_ms: 500           # 等待慢轨道的宽限期（毫秒）
    full_action: "clear"     # 窗口满载处理策略：drop | clear | keep
  engine:
    input:
      # 帧率旋钮集中在此一处(对应 InputConfig):
      #   fps      —— 下发/pipeline 帧率 = tracker 帧率(下采后 tracker 逐帧消费全部)
      #   omni_fps —— 送 omni 的视频帧率, 与 fps 解耦; omni 已是瓶颈, 不随 tracker 提频涨
      fps: 3
      omni_fps: 1
    identity:
      # mock | real | deep_sort —— v1.2 主动注册默认 deep_sort,DeepSORT 内置
      # ReID 关联,跟踪更稳;额外暴露 Track.features deque 给陌生人池零额外推理
      # 取 emb。回退路径:切 "real" 启用纯 SORT(陌生人池退化为"只累积、不去重")。
      tracking_service_mode: "deep_sort"
    omni:
      timeout: 30.0 # 请求超时（秒）

    # 注：omni 身份识别系统（identity_engine）配置位于
    # ``perception/engine/identity/default_config.yaml``，本文件不维护其默认值。
    # 如需运维侧覆盖默认（少数场景），可在此追加 ``identity_engine:`` 块；
    # 加载时由 ``identity/config_loader.py::load_identity_engine_config`` 深合并。


# 消息投递调度参数
dispatcher:
  turn_wait_timeout_ms: 180000   # 同步等待单个 agent turn 结束的超时（毫秒）
  max_queue: 10                  # 每会话队列上限；超出按 (类型优先级, 条目级优先级, 入队时间) 淘汰最不紧急者

# 可观测性
perf:
  enabled: true                # SQLite traces 采集开关
  omni_log_max_file_mb: 100    # omni_log 单文件 size 上限 MB,超过 rotate;0 = 禁用
  retention:
    traces_days: 7             # traces / traces_device 表保留天数
    events_days: 7             # events 表保留天数
    agent_runs_days: 7         # agent_runs 表保留天数
    trace_jsonl_days: 7        # agent jsonl.gz 文件保留天数
    omni_log_days: 7           # omni 交互 log 保留天数
